<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Satisfying Trigger</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 60px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .trigger {
            padding: 20px 50px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #222;
            color: white;
            transition: 0.25s;
        }

        /* Effekt 1: Bounce */
        .bounce {
            animation: bounce 0.4s ease;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* Effekt 2: Glow */
        .glow {
            animation: glow 0.6s ease;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 0px #0ff; }
            100% { box-shadow: 0 0 25px #0ff; }
        }

        /* Effekt 3: Rotate */
        .rotate {
            animation: rotate 0.5s ease;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Satisfying Trigger Demo</h1>

    <div class="container">
        <button class="trigger" id="trigger1">Bounce</button>
        <button class="trigger" id="trigger2">Glow</button>
        <button class="trigger" id="trigger3">Rotate</button>
    </div>

    <script>
        function animate(id, effect) {
            const el = document.getElementById(id);
            el.classList.add(effect);

            setTimeout(() => {
                el.classList.remove(effect);
            }, 500);
        }

        document.getElementById("trigger1").onclick = () => animate("trigger1", "bounce");
        document.getElementById("trigger2").onclick = () => animate("trigger2", "glow");
        document.getElementById("trigger3").onclick = () => animate("trigger3", "rotate");
    </script>

</body>
</html>
